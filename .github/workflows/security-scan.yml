name: Security Scan

on:
  push:
    branches:
      - main
      - develop
      - "claude/**"
  pull_request:
    branches:
      - main
      - develop
  schedule:
    # Run weekly on Sundays at 2:00 AM UTC
    - cron: "0 2 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  python-security:
    name: Python Dependency Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        id: setup-python
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Report Python cache status
        run: echo "Python cache hit:" "${{ steps.setup-python.outputs.cache-hit }}"

      - name: Install security scanning tools
        run: |
          python -m pip install --upgrade pip
          pip install "$(grep -E '^pip-audit==' requirements.lock)"

      - name: Run pip-audit check
        id: pip-audit
        continue-on-error: true
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## pip-audit Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # CVE-2026-0994: protobuf DoS vulnerability - no fix released yet (patch in master only)
          # Remove --ignore-vuln once protobuf releases a patched version
          # GHSA-5239-wwwm-4pmq: pygments ReDoS in AdlLexer - no fix released yet (upstream unresponsive)
          # Remove --ignore-vuln once pygments releases a patched version
          if pip-audit -r requirements.lock --desc --ignore-vuln CVE-2026-0994 --ignore-vuln GHSA-5239-wwwm-4pmq > pip-audit-report.txt 2>&1; then
            echo "✅ **pip-audit Check**: No known security vulnerabilities detected" >> $GITHUB_STEP_SUMMARY
            echo "audit_exit=0" >> $GITHUB_OUTPUT
            echo "AUDIT_STATUS=success" >> $GITHUB_ENV
          else
            echo "⚠️ **pip-audit Check**: Vulnerabilities detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat pip-audit-report.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "audit_exit=1" >> $GITHUB_OUTPUT
            echo "AUDIT_STATUS=failure" >> $GITHUB_ENV
          fi

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.txt
          retention-days: 30

      - name: Security Scan Summary
        env:
          AUDIT_STATUS: ${{ env.AUDIT_STATUS }}
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "## Overall Security Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          AUDIT_STATUS="${AUDIT_STATUS:-failure}"

          echo "🔍 Debug: Audit status: $AUDIT_STATUS" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$AUDIT_STATUS" == "success" ]; then
            echo "✅ **All security checks passed**" >> $GITHUB_STEP_SUMMARY
            echo "No known security vulnerabilities were detected in your Python dependencies." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          echo "⚠️ **Security vulnerabilities detected - please review and remediate**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- pip-audit scan detected vulnerabilities" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps:" >> $GITHUB_STEP_SUMMARY
          echo "1. Review the vulnerability reports above" >> $GITHUB_STEP_SUMMARY
          echo "2. Update affected packages to secure versions" >> $GITHUB_STEP_SUMMARY
          echo "3. Test the application with updated dependencies" >> $GITHUB_STEP_SUMMARY
          echo "4. Commit the updated requirements.lock (and requirements.txt if ranges changed)" >> $GITHUB_STEP_SUMMARY
          echo "5. Re-run this security scan to verify fixes" >> $GITHUB_STEP_SUMMARY
          exit 1

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    # Only run on pull requests to prevent issues with scheduled runs
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: true
