permissions:
  contents: read
  pull-requests: write

name: SonarCloud

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: sonarcloud-${{ github.event.pull_request.base.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-sonar-

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Python
        uses: actions/setup-python@v5
        id: setup-python
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Report Python cache status
        run: echo "Python cache hit:" "${{ steps.setup-python.outputs.cache-hit }}"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint bandit
          pip install -r requirements.txt

      - name: Run Python Tests with Coverage
        run: |
          pytest tests/python --cov=src/python --cov=src/common --cov-report=xml:coverage/python/coverage.xml --cov-report=term-missing --cov-fail-under=1
        continue-on-error: false

      - name: Upload Python Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/python/coverage.xml
          flags: python
          name: python-coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload Python Test Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Python-Coverage-Report
          path: coverage/python/coverage.xml

      - name: Run Pylint (Python Linting)
        run: |
          pylint --errors-only --disable=import-error,no-member,used-before-assignment,no-name-in-module,possibly-used-before-assignment $(git ls-files '*.py')

      - name: Run Bandit (Python Security Scan)
        run: |
          bandit -r . -f json -o bandit-report.json -c pyproject.toml

      - name: Upload Bandit Security Report
        uses: actions/upload-artifact@v4
        with:
          name: Bandit-Security-Report
          path: bandit-report.json

      - name: Run mypy (Type Checking)
        run: |
          pip install mypy types-requests types-tqdm
          mypy src/python --config-file=mypy.ini || true  # Informational only
        continue-on-error: true

      - name: Install PowerShell
        run: |
          sudo apt-get update
          sudo apt-get install -y powershell

      - name: Determine PowerShell module cache path
        id: ps-cache-path
        shell: pwsh
        run: |
          $modulePath = ($env:PSModulePath -split [System.IO.Path]::PathSeparator)[0]
          "PS_MODULE_CACHE=$modulePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "cache-path=$modulePath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Cache PowerShell modules
        id: cache-pwsh
        uses: actions/cache@v4
        with:
          path: ${{ env.PS_MODULE_CACHE }}
          key: ${{ runner.os }}-psmodules-v1

      - name: Report PowerShell module cache status
        run: echo "PowerShell module cache hit:" "${{ steps.cache-pwsh.outputs.cache-hit }}"

      - name: Install Pester (PowerShell Testing Framework)
        shell: pwsh
        run: |
          if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) {
            Register-PSRepository -Default
          }
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Pester -Force -Scope CurrentUser -SkipPublisherCheck

      - name: Run PowerShell Tests with Coverage
        shell: pwsh
        run: |
          .\tests\powershell\Invoke-Tests.ps1 -MinimumCoverage 0 -Verbosity Detailed
        continue-on-error: false

      - name: Upload PowerShell Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/powershell/coverage.xml
          flags: powershell
          name: powershell-coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload PowerShell Test Results Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PowerShell-Test-Results
          path: powershell-testresults.xml

      - name: Upload PowerShell Coverage Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PowerShell-Coverage-Report
          path: coverage/powershell/coverage.xml

      - name: Cache Sonar Scanner
        id: cache-sonar
        uses: actions/cache@v4
        with:
          path: sonar-scanner
          key: sonar-scanner-6.0.0.4432-linux

      - name: Install Sonar Scanner
        if: steps.cache-sonar.outputs.cache-hit != 'true'
        run: |
          wget -q https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-6.0.0.4432-linux.zip
          if [ ! -f sonar-scanner-cli-6.0.0.4432-linux.zip ]; then
            echo "Download failed!"
            exit 1
          fi
          unzip -q sonar-scanner-cli-6.0.0.4432-linux.zip -d sonar-scanner

      - name: Update PATH for Sonar Scanner
        run: |
          echo "${{ github.workspace }}/sonar-scanner/sonar-scanner-6.0.0.4432-linux/bin" >> $GITHUB_PATH

      - name: Detect whether SonarCloud can run
        id: sonar_guard
        shell: bash
        run: |
          if [ -n "${{ secrets.SONAR_TOKEN }}" ]; then
            echo "can_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_run=false" >> "$GITHUB_OUTPUT"
          fi

          echo "event_name=${{ github.event_name }}"
          echo "actor=${{ github.actor }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "head_repo=${{ github.event.pull_request.head.repo.full_name }}"
            echo "is_fork=${{ github.event.pull_request.head.repo.fork }}"
          fi

      - name: Check SonarCloud Token
        if: steps.sonar_guard.outputs.can_run == 'true'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: bash
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "::error::SONAR_TOKEN secret is not configured or is empty!"
            exit 1
          fi

          if [[ ! "$SONAR_TOKEN" =~ ^squ_ ]]; then
            echo "::warning::SONAR_TOKEN does not appear to be a valid SonarCloud user token format (should start with 'squ_')"
            echo "::warning::This might be an old token format. Consider regenerating a new user token."
          fi

          echo "✅ SonarCloud token is configured and appears valid"

      - name: Skip SonarCloud
        if: steps.sonar_guard.outputs.can_run != 'true'
        shell: bash
        run: |
          echo "::notice::Skipping SonarCloud because SONAR_TOKEN is unavailable in this workflow context."
          echo "::notice::This is expected for some contexts such as fork PRs or misconfigured secrets."

      - name: SonarCloud Scan
        if: steps.sonar_guard.outputs.can_run == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: bash
        run: |
          echo "🔍 Checking coverage files..."
          if [ ! -f "coverage/python/coverage.xml" ]; then
            echo "::warning::Python coverage file not found: coverage/python/coverage.xml"
          else
            echo "✅ Found Python coverage file"
          fi

          if [ ! -f "coverage/powershell/coverage.xml" ]; then
            echo "::warning::PowerShell coverage file not found: coverage/powershell/coverage.xml"
          else
            echo "✅ Found PowerShell coverage file"
          fi

          echo "🚀 Starting SonarCloud analysis..."

          sonar-scanner \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token="$SONAR_TOKEN" \
            -Dsonar.python.coverage.reportPaths=coverage/python/coverage.xml \
            -Dsonar.coverage.jacoco.xmlReportPaths=coverage/powershell/coverage.xml \
            -Dsonar.verbose=false

          echo "✅ SonarCloud analysis completed successfully!"
